
name: FunMarket File Automation

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  process-files:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      ############################################################
      # Detect changed files
      ############################################################

      - name: Detect changed files
        id: changed
        run: |
          git diff --name-status ${{ github.event.before }} ${{ github.sha }} > files.txt
          cat files.txt


      ############################################################
      # Filter only required folders
      ############################################################

      - name: Filter performance folders
        run: |
          python3 << 'EOF'
          import json

          allowed = [
            "dailyPerformance/",
            "weeklyPerformance/",
            "monthlyPerformance/",
            "yearlyPerformance/"
          ]

          files=[]
          status={}

          with open("files.txt") as f:
              for line in f:
                  parts=line.strip().split("\t")
                  if len(parts) < 2:
                      continue

                  st,path = parts

                  if any(path.startswith(a) for a in allowed):
                      files.append(path)
                      status[path]=st

          data={"files":files,"status":status}

          with open("filtered.json","w") as f:
              json.dump(data,f)

          print("Filtered Files:",files)
          EOF


      ############################################################
      # Collect GitHub metadata
      ############################################################

      - name: Collect file metadata
        run: |
          python3 << 'EOF'
          import json, os, subprocess

          with open("filtered.json") as f:
              data=json.load(f)

          files=data["files"]
          status_map=data["status"]

          payload=[]

          for file in files:

              try:
                  size=os.path.getsize(file)
              except:
                  size=0

              filetype=file.split(".")[-1]

              commit_msg=subprocess.getoutput(f'git log -1 --pretty=%B -- "{file}"')
              author=subprocess.getoutput(f'git log -1 --pretty=%an -- "{file}"')
              email=subprocess.getoutput(f'git log -1 --pretty=%ae -- "{file}"')
              date=subprocess.getoutput(f'git log -1 --pretty=%cI -- "{file}"')

              obj={
                "fileName":file,
                "fileType":filetype,
                "fileSize":size,
                "gitHubFileStatus":status_map[file],
                "gitHubFileInToSubBranchPusherName":author,
                "gitHubFileInToSubBranchPusherEmailId":email,
                "commitMessagesInSubBranch":commit_msg,
                "gitFileCreationDateAndTimeInSubBranch":date
              }

              payload.append(obj)

          with open("payload.json","w") as f:
              json.dump(payload,f)

          print("Payload ready")
          EOF


      ############################################################
      # Wake backend services
      ############################################################

      - name: Wake Config Server
        run: curl -s https://funmarketconfigserver-dckt.onrender.com/actuator/health || true

      - name: Wait 30 seconds
        run: sleep 30

      - name: Wake DB
        run: curl -s https://funmarketdb.onrender.com/actuator/health || true

      - name: Wait 30 seconds
        run: sleep 30

      - name: Wake Git Reader
        run: curl -s https://funmarketgitreader.onrender.com/actuator/health || true

      - name: Wait 30 seconds
        run: sleep 30


      ############################################################
      # Send file data to application
      ############################################################

      - name: Send data to application
        run: |
          curl -s -X POST \
          https://funmarketgitreader.onrender.com/fun-market/git-reader/process-file-information \
          -H "Content-Type: application/json" \
          -d @payload.json \
          -o response.json


      ############################################################
      # Send Telegram messages (Auto formatter)
      ############################################################

      - name: Send Telegram formatted messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'EOF'
          import json, requests
          from datetime import datetime, timedelta

          BOT_TOKEN = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"

          TELEGRAM_LIMIT = 3900

          with open("response.json") as f:
              data=json.load(f)

          messages=[]

          for i,item in enumerate(data,1):

              d=item.get("data",{})

              block=f"""
              📄 File {i}

              File Name : {d.get("fileName")}
              File Type : {d.get("fileType")}
              File Size : {d.get("fileSize")}

              GitHub Status : {d.get("gitHubFileStatus")}

              Pusher Name : {d.get("gitHubFileInToSubBranchPusherName")}
              Pusher Email : {d.get("gitHubFileInToSubBranchPusherEmailId")}

              Merger Name : {d.get("fileGithubFileMergedIntoMainBranchMergerName")}
              Merger Email : {d.get("fileGithubFileMergedIntoMainBranchMergerEmailId")}

              Processing Status : {d.get("fileprocessingStatus")}

              Sub Branch Commits : {d.get("commitMessagesInSubBranch")}
              Main Branch Commits : {d.get("commitMessagesInMainBranch")}
              """

              messages.append(block)

          ist=datetime.utcnow()+timedelta(hours=5,minutes=30)

          summary=f"""

          📊 Summary

          Files Processed : {len(data)}
          Execution Time : {ist.strftime("%d %B %Y %I:%M %p IST")}

          🤖 Fun Market Automation System
          """

          messages.append(summary)

          chunks=[]
          current=""

          for m in messages:
              if len(current)+len(m) > TELEGRAM_LIMIT:
                  chunks.append(current)
                  current=m
              else:
                  current+= "\n\n"+m

          chunks.append(current)

          for msg in chunks:

              url=f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"

              payload={
                "chat_id":CHAT_ID,
                "text":msg,
                "parse_mode":"HTML"
              }

              requests.post(url,data=payload)

          print("Telegram messages sent")
          EOF


      ############################################################
      # Email report
      ############################################################

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          secure: false
          subject: "FunMarket Git File Processing Report"
          to: funstockmarket365@gmail.com,katukojwalaharshavardhan97@gmail.com
          from: "FunMarket Automation"
          body: |
            FunMarket Git Processing Completed

            Repository : ${{ github.repository }}
            Branch     : main

            The workflow successfully processed the GitHub files
            and sent them to the FunMarket application.

            Telegram report has been delivered.

            FunMarket Automation System

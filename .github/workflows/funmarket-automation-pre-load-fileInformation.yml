
name: FunMarket Processor

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  process:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

############################################################
# STEP 1 — Ensure commit is merged into main
############################################################

      - name: Check merge commit
        run: |
          parents=$(git rev-list --parents -n 1 HEAD | wc -w)
          if [ "$parents" -lt 3 ]; then
            echo "Not a merge commit. Exiting workflow."
            exit 0
          fi

############################################################
# STEP 2 — Detect changed files
############################################################

      - name: Detect changed files
        run: |
          git diff --name-status ${{ github.event.before }} ${{ github.sha }} > files.txt
          cat files.txt

############################################################
# STEP 3 — Filter only allowed folders
############################################################

      - name: Filter folders
        run: |
          python3 << 'EOF'
          import json

          allowed=[
            "dailyPerformance/",
            "weeklyPerformance/",
            "monthlyPerformance/",
            "yearlyPerformance/"
          ]

          files=[]
          status={}

          with open("files.txt") as f:
              for line in f:
                  parts=line.strip().split("\t")
                  if len(parts) < 2:
                      continue
                  st,path=parts

                  if any(path.startswith(a) for a in allowed):
                      files.append(path)
                      status[path]=st

          if len(files)==0:
              print("No valid folder changes. Exiting.")
              exit()

          with open("filtered.json","w") as f:
              json.dump({"files":files,"status":status},f)

          print("Accepted files:",files)
          EOF

############################################################
# STEP 4 — Wake backend services
############################################################

      - name: Wake Config Server
        run: curl -s https://funmarketconfigserver-dckt.onrender.com/actuator/health || true

      - name: Wait 30 seconds
        run: sleep 30

      - name: Wake DB
        run: curl -s https://funmarketdb.onrender.com/actuator/health || true

      - name: Wait 30 seconds
        run: sleep 30

      - name: Wake Git Reader
        run: curl -s https://funmarketgitreader.onrender.com/actuator/health || true

      - name: Wait 30 seconds
        run: sleep 30

############################################################
# STEP 5 — Collect required 14 fields
############################################################

      - name: Collect 14 fields
        run: |
          python3 << 'EOF'
          import json,os,subprocess

          def run(cmd):
              return subprocess.getoutput(cmd).strip()

          with open("filtered.json") as f:
              data=json.load(f)

          files=data["files"]
          status_map=data["status"]

          payload=[]

          for path in files:

              name=os.path.basename(path)
              ext=name.split(".")[-1] if "." in name else ""

              try:
                  size=os.path.getsize(path)
              except:
                  size=0

              commit_msg_sub = run(f'git log -1 --pretty=%B -- "{path}"')
              pusher_name = run(f'git log -1 --pretty=%an -- "{path}"')
              pusher_email = run(f'git log -1 --pretty=%ae -- "{path}"')
              sub_date = run(f'git log -1 --pretty=%cI -- "{path}"')

              merger_name = run('git log -1 --pretty=%cn')
              merger_email = run('git log -1 --pretty=%ce')
              main_msg = run('git log -1 --pretty=%B')
              main_date = run('git log -1 --pretty=%cI')

              st=status_map.get(path,"M")
              status={
                "A":"ADDED",
                "M":"MODIFIED",
                "D":"REMOVED"
              }.get(st,st)

              obj={
                "fileName":name,
                "fileType":ext,
                "fileSize":size,
                "gitFileCreationDateAndTimeInSubBranch":sub_date,
                "fileMRApprovedDateAndTime":main_date,
                "fileCreationAndMergedIntoMainBranchDateAndTime":main_date,
                "fileModifiedInGitHubDateAndTime":main_date,
                "gitHubFileInToSubBranchPusherName":pusher_name,
                "fileGithubFileMergedIntoMainBranchMergerName":merger_name,
                "fileGithubFileMergedIntoMainBranchMergerEmailId":merger_email,
                "gitHubFileInToSubBranchPusherEmailId":pusher_email,
                "commitMessagesInSubBranch":commit_msg_sub,
                "commitMessagesInMainBranch":main_msg,
                "status":status
              }

              payload.append(obj)

          with open("payload.json","w") as f:
              json.dump(payload,f,indent=2)

          print("Payload built:",payload)
          EOF

############################################################
# STEP 6 — Send data to application
############################################################
      - name: Wait 30 seconds
        run: sleep 30

      - name: Send payload to application
        run: |
          curl -s -X POST           https://funmarketgitreader.onrender.com/fun-market/git-reader/process-file-information           -H "Content-Type: application/json"           -d @payload.json           -o response.json

############################################################
# STEP 7 — Format Telegram sections from response
############################################################

      - name: Build Telegram message
        run: |
          python3 << 'EOF'
          import json

          with open("response.json") as f:
              data=json.load(f)

          message="🚀 GitHub File Processing Completed\n\n"

          for i,item in enumerate(data,1):

              d=item.get("data",{})

              message+=f"""
                📄 File {i}

                File Information UUID : {d.get("fileInformationUuid")}
                File Name : {d.get("fileName")}
                File Type : {d.get("fileType")}
                File Size : {d.get("fileSize")}
                File URI : {d.get("fileUri")}
                File Folder Name : {d.get("fileFolderName")}
                File Stock Details UUID : {d.get("fileStockDetailsUuid")}

                GitHub File Status : {d.get("gitHubFileStatus")}
                Processing Status : {d.get("fileprocessingStatus")}

                Git File Creation Time : {d.get("gitFileCreationDateAndTimeInSubBranch")}
                MR Approved Time : {d.get("fileMRApprovedDateAndTime")}
                File Processed Date : {d.get("fileProcessedDateAndTime")}

                File Created & Merged Into Main : {d.get("fileCreationAndMergedIntoMainBranchDateAndTime")}
                File Modified In GitHub : {d.get("fileModifiedInGitHubDateAndTime")}

                Sub Branch Pusher Name : {d.get("gitHubFileInToSubBranchPusherName")}
                Sub Branch Pusher Email : {d.get("gitHubFileInToSubBranchPusherEmailId")}

                Main Branch Merger Name : {d.get("fileGithubFileMergedIntoMainBranchMergerName")}
                Main Branch Merger Email : {d.get("fileGithubFileMergedIntoMainBranchMergerEmailId")}

                Uploaded Into Main Branch Day : {d.get("fileUploadedIntoGitHubMainBranchDay")}
                Uploaded Into Sub Branch Day : {d.get("fileUploadedIntoGitHubSubBranchDay")}

                Uploaded To Main Branch Working Day : {d.get("isFileUploadedToGitHubMainBranchInWorkingDay")}
                Uploaded To Sub Branch Working Day : {d.get("isFileUploadedToGitHubSubBranchInWorkingDay")}

                Is File Modified In GitHub : {d.get("isFileModifiedInGitHub")}
                Is File Deleted In GitHub : {d.get("isFileDeletedInGitHub")}
                Is File Processed : {d.get("isFileProcessed")}

                Processing Count : {d.get("fileProcessingNumberOfCount")}
                Processing Error : {d.get("fileProcessingError")}

                Is File Created In Server : {d.get("isFileCreatedInServer")}
                Is File Deleted In Server : {d.get("isFileDeletedInServer")}
                Is File Modified In Server : {d.get("isFileModifiedInServer")}

                File Validation Status : {d.get("fileValidationStatus")}
                Number Of Records : {d.get("numberOfRecords")}

                File Creation Place : {d.get("fileInformationPlaceOfCreation")}

                Record Created Time : {d.get("fileInformationRecordCreatedDateAndTime")}
                Record Modified Time : {d.get("fileInformationRecordModifiedDateAndTime")}

                File Information Status : {d.get("fileInformationStatus")}

              -------------------------------------------
              """

          with open("telegram.txt","w") as f:
              f.write(message)
          EOF

############################################################
# STEP 8 — Send Telegram
############################################################

      - name: Send Telegram
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT=$(cat telegram.txt)

          curl -s -X POST https://api.telegram.org/bot$TOKEN/sendMessage             -d chat_id=$CHAT             -d text="$TEXT"

name: FunMarket fileInformation PreProcessing

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches:
      - main

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata

    steps:

############################################
# STEP 1 — Checkout
############################################
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

############################################
# STEP 2 — Merge commit check
############################################
    - name: Check merge commit
      id: mergecheck
      run: |
        parents=$(git rev-list --parents -n 1 HEAD | wc -w)
        if [ "$parents" -lt 3 ]; then
          echo "continue=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "continue=true" >> $GITHUB_OUTPUT
############################################
# STEP 3 — Detect changed files
############################################
    - name: Detect changed files
      if: steps.mergecheck.outputs.continue == 'true'
      run: |
        git diff --name-status ${{ github.event.before }} ${{ github.sha }} > files.txt
############################################
# STEP 4 — Filter folders
############################################
    - name: Filter folders
      id: filter
      if: steps.mergecheck.outputs.continue == 'true'
      run: |
        python3 << 'EOF'
        import json, os
        allowed=[
          "dailyPerformance/",
          "weeklyPerformance/",
          "monthlyPerformance/",
          "yearlyPerformance/"
        ]
        files=[]
        status={}
        with open("files.txt") as f:
            for line in f:
                parts=line.strip().split("\t")
                if len(parts)<2:
                    continue
                st,path=parts
                if any(path.startswith(a) for a in allowed):
                    files.append(path)
                    status[path]=st
        if len(files)==0:
            with open(os.environ["GITHUB_OUTPUT"],"a") as out:
                out.write("continue=false\n")
            exit(0)
        with open("filtered.json","w") as f:
            json.dump({"files":files,"status":status},f)
        with open(os.environ["GITHUB_OUTPUT"],"a") as out:
            out.write("continue=true\n")
        EOF
############################################
# STEP 5 — Wake services
############################################
    - name: Wake & Wait Services
      if: steps.filter.outputs.continue == 'true'
      run: |

        check_service() {
          NAME=$1
          URL=$2

          for i in {1..60}
          do
            if curl -s "$URL" | grep -q "UP"; then
              echo "$NAME UP ✅"
              return 0
            fi
            echo "$NAME retry $i"
            sleep 5
          done

          echo "$NAME failed ❌"
          exit 1
        }

        # Config first
        check_service "Config" "https://funmarketconfigserver-dckt.onrender.com/actuator/health"

        # Trigger DB + GitReader
        curl -s https://funmarketdb.onrender.com/actuator/health || true &
        curl -s https://funmarketgitreader.onrender.com/actuator/health || true &
        wait

        # Wait parallel
        check_service "DB" "https://funmarketdb.onrender.com/actuator/health" &
        PID_DB=$!

        check_service "GitReader" "https://funmarketgitreader.onrender.com/actuator/health" &
        PID_GR=$!

        wait $PID_DB
        wait $PID_GR

############################################
# STEP 6 — Get PR number
############################################
    - name: Get PR number
      if: steps.filter.outputs.continue == 'true'
      run: |
        curl -s \
        -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
        https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
        > pr_list.json
        PR_NUMBER=$(jq -r '.[0].number // empty' pr_list.json)
        if [ -z "$PR_NUMBER" ]; then
          echo "No PR found"
          exit 0
        fi
        echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
############################################
# STEP 7 — Fetch PR info
############################################
    - name: Fetch PR info
      if: steps.filter.outputs.continue == 'true'
      run: |
        curl -s \
        -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
        https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER \
        > pr.json
############################################
# STEP 8 — Extract MR fields
############################################
    - name: Extract MR fields
      if: steps.filter.outputs.continue == 'true'
      run: |
        CREATED=$(jq -r '.created_at // ""' pr.json)
        MERGED=$(jq -r '.merged_at // ""' pr.json)
        PUBLISHER=$(jq -r '.user.login // ""' pr.json)
        ASSIGNEES=$(jq -r '[.assignees[]?.login] | join(", ")' pr.json)
        REVIEWS=$(curl -s \
        -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
        https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews)
        echo "REVIEWS:"
        echo "$REVIEWS"
        APPROVED=$(echo "$REVIEWS" | jq -r '[.[]? | select(.state=="APPROVED")][0].submitted_at // ""')
        APPROVER=$(echo "$REVIEWS" | jq -r '[.[]? | select(.state=="APPROVED")][0].user.login // ""')
        CREATED_IST=$(date -d "$CREATED" +"%Y-%m-%dT%H:%M:%S" 2>/dev/null || echo "")
        APPROVED_IST=$(date -d "$APPROVED" +"%Y-%m-%dT%H:%M:%S" 2>/dev/null || echo "")
        MERGED_IST=$(date -d "$MERGED" +"%Y-%m-%dT%H:%M:%S" 2>/dev/null || echo "")
        jq -n \
        --arg publisher "$PUBLISHER" \
        --arg approver "$APPROVER" \
        --arg created "$CREATED_IST" \
        --arg approved "$APPROVED_IST" \
        --arg merged "$MERGED_IST" \
        --arg assignees "$ASSIGNEES" \
        '{
          fileMRPublisherName:$publisher,
          fileMRApprovedName:$approver,
          fileMRPublisherDateAndTime:$created,
          fileMRApprovedDateAndTime:$approved,
          fileCreationAndMergedIntoMainBranchDateAndTime:$merged,
          AssigneesNames:$assignees
        }' > mr_fields.json
############################################
# STEP 9 — Build payload
############################################
    - name: Build payload
      if: steps.filter.outputs.continue == 'true'
      run: |
        python3 << 'EOF'
        import json, subprocess, os
        def run(cmd):
            return subprocess.getoutput(cmd).strip()
        def to_ist(date):
            return run(f'date -d "{date}" +"%Y-%m-%dT%H:%M:%S"')
        with open("filtered.json") as f:
            data=json.load(f)
        with open("mr_fields.json") as f:
            mr=json.load(f)
        payload=[]
        main_commit = run('git log -1 --pretty=%s')
        main_merger = run('git log -1 --pretty=%cn')
        main_merger_email = run('git log -1 --pretty=%ce')
        for path in data["files"]:
            name=os.path.basename(path)
            ext=name.split(".")[-1]
            size=os.path.getsize(path) if os.path.exists(path) else 0
            sub_date = run(f'git log -1 --pretty=%cI -- "{path}"')
            sub_date_ist = to_ist(sub_date)
            sub_commit = run(f'git log -1 --pretty=%s -- "{path}"')
            pusher_name=run(f'git log -1 --pretty=%an -- "{path}"')
            pusher_email=run(f'git log -1 --pretty=%ae -- "{path}"')
            status=data["status"].get(path,"M")
            status_map={
                "A":"ADDED",
                "M":"MODIFIED",
                "D":"REMOVED"
            }
            obj={
                "fileName":name,
                "fileType":ext,
                "fileSize":size,
                "gitFileCreationDateAndTimeInSubBranch":sub_date_ist,
                "fileMRPublisherDateAndTime":mr["fileMRPublisherDateAndTime"],
                "fileMRApprovedDateAndTime":mr["fileMRApprovedDateAndTime"],
                "fileCreationAndMergedIntoMainBranchDateAndTime":mr["fileCreationAndMergedIntoMainBranchDateAndTime"],
                "fileModifiedInGitHubDateAndTime":sub_date_ist,
                "gitHubFileInToSubBranchPusherName":pusher_name,
                "gitHubFileInToSubBranchPusherEmailId":pusher_email,
                "fileGithubFileMergedIntoMainBranchMergerName":main_merger,
                "fileGithubFileMergedIntoMainBranchMergerEmailId":main_merger_email,
                "commitMessagesInSubBranch":sub_commit,
                "commitMessagesInMainBranch":main_commit,
                "status":status_map.get(status,status),
                "fileMRPublisherName":mr["fileMRPublisherName"],
                "fileMRApprovedName":mr["fileMRApprovedName"],
                "AssigneesNames":mr["AssigneesNames"]
            }
            payload.append(obj)
        with open("payload.json","w") as f:
            json.dump(payload,f,indent=2)
        print(payload)
        EOF
############################################
# STEP 10 — Send payload
############################################
    - name: Send payload
      if: steps.filter.outputs.continue == 'true'
      run: |
        curl -X POST \
        https://funmarketgitreader.onrender.com/fun-market/git-reader/process-file-information \
        -H "Content-Type: application/json" \
        -d @payload.json

name: Process Stock Transactions (Full Fix)

on:
  push:
    branches:
      - main
    paths:
      - 'masterData/holdings/stockTransaction.csv'

jobs:
  sync-holdings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas

      - name: Generate Delta JSON
        id: delta
        shell: python
        run: |
          import pandas as pd
          import json
          import os
          import subprocess
          from io import StringIO

          file_path = 'masterData/holdings/stockTransaction.csv'
          curr_df = pd.read_csv(file_path)
          
          try:
              prev_content = subprocess.check_output(['git', 'show', 'HEAD~1:' + file_path]).decode('utf-8')
              prev_df = pd.read_csv(StringIO(prev_content))
          except Exception:
              prev_df = pd.DataFrame(columns=curr_df.columns)

          curr_ids = curr_df.iloc[:, 0].tolist()
          prev_ids = prev_df.iloc[:, 0].tolist()
          results = []

          for _, row in curr_df.iterrows():
              row_id = row.iloc[0]
              row_dict = row.to_dict()
              if row_id not in prev_ids:
                  row_dict['status'] = 'ADDED'
                  results.append(row_dict)
              else:
                  prev_row = prev_df[prev_df.iloc[:, 0] == row_id].iloc[0]
                  if not row.equals(prev_row):
                      row_dict['status'] = 'MODIFIED'
                      results.append(row_dict)

          for _, row in prev_df.iterrows():
              if row.iloc[0] not in curr_ids:
                  row_dict = row.to_dict()
                  row_dict['status'] = 'REMOVED'
                  results.append(row_dict)

          with open('payload.json', 'w') as f:
              json.dump(results, f, indent=2)

      - name: Zip and Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-transaction-zip
          path: payload.json
          retention-days: 7


name: Process Broker Data

on:
  push:
    branches:
      - main
    paths:
      - 'masterData/brokers/**'

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pre-Activation Logs
        run: |
          echo "Starting workflow: Isolating specific row changes..."
          echo "Target Folder: masterData/brokers/**"
      # - name: Wake up Services
      #   run: |
      #     echo "Waking up Config Server..."
      #     curl -f -s https://funmarketconfigserver-dckt.onrender.com/actuator/health
          
      #     echo "Waking up Database Server..."
      #     curl -f -s https://funmarketdb.onrender.com/actuator/health

      - name: Parse Touched Records and Send Data
        shell: python
        run: |
          import csv
          import json
          import requests
          import subprocess
          import io
          def get_changed_files():
              cmd = ["git", "diff-tree", "--no-commit-id", "--name-status", "-r", "HEAD"]
              result = subprocess.run(cmd, capture_output=True, text=True)
              lines = result.stdout.strip().split('\n')
              return [line.split(None, 1) for line in lines if line.strip() and line.split(None, 1)[1].startswith('masterData/brokers/')]
          def get_records(content_lines):
              if not content_lines: return {}
              # Using brokerIdentifier as the unique key to track rows
              reader = csv.DictReader(content_lines)
              return {row['brokerIdentifier']: row for row in reader}
          changed_files = get_changed_files()
          all_touched_data = []
          for status, path in changed_files:
              # 1. Get Current Version
              current_content = []
              if status != 'D':
                  with open(path, 'r') as f: current_content = f.readlines()
              
              # 2. Get Previous Version
              prev_content = []
              try:
                  cmd = ["git", "show", f"HEAD~1:{path}"]
                  prev_result = subprocess.run(cmd, capture_output=True, text=True)
                  if prev_result.returncode == 0:
                      prev_content = prev_result.stdout.splitlines()
              except: pass
              curr_dict = get_records(current_content)
              prev_dict = get_records(prev_content)
              # Find ADDED or MODIFIED
              for bid, row in curr_dict.items():
                  if bid not in prev_dict:
                      row['recordStatus'] = 'ADDED'
                      all_touched_data.append(row)
                  elif row != prev_dict[bid]:
                      row['recordStatus'] = 'MODIFIED'
                      all_touched_data.append(row)
              # Find REMOVED
              for bid, row in prev_dict.items():
                  if bid not in curr_dict:
                      row['recordStatus'] = 'REMOVED'
                      all_touched_data.append(row)
          # Output results
          print(f"Found {len(all_touched_data)} touched records.")
          print(json.dumps(all_touched_data, indent=2))
          with open('processed_broker_data.json', 'w') as f:
              json.dump(all_touched_data, f, indent=2)
          # Send data to the application API
          # if all_touched_data:
          #     url = "https://funmarketdb.onrender.com/broker/addAllBroker"
          #     response = requests.post(url, json=all_touched_data)
          #     if response.status_code != 200: exit(1)
      - name: Upload JSON for Download
        uses: actions/upload-artifact@v4
        with:
          name: broker-json-output
          path: processed_broker_data.json
          retention-days: 7
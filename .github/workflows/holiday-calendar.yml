name: Holiday Calendar Processor

on:
  push:
    branches:
      - main
    paths:
      - 'holidayCalendar/**'

jobs:
  process-holidays:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Process CSV and Generate JSON
        run: |
          echo "🔍 Detecting file changes..."
          git diff --name-status ${{ github.event.before }} ${{ github.sha }} > changes.txt
          cat changes.txt
          JSON_OUTPUT="[]"
          while read status file; do
            if [[ "$file" != holidayCalendar/* ]]; then
              continue
            fi
            echo "📁 Processing $file with status $status"
            FILE_STATUS=""
            if [[ "$status" == "A" ]]; then
              FILE_STATUS="ADDED"
              CONTENT=$(cat "$file")
            elif [[ "$status" == "M" ]]; then
              FILE_STATUS="MODIFIED"
              CONTENT=$(cat "$file")
            elif [[ "$status" == "D" ]]; then
              FILE_STATUS="REMOVED"
              CONTENT=$(git show HEAD~1:"$file" 2>/dev/null || echo "")
              if [ -z "$CONTENT" ]; then
                echo "⚠️ Skipping $file (no content found)"
                continue
              fi
            else
              continue
            fi
            YEAR=$(basename "$file" .csv)
            echo "📄 Preview:"
            echo "$CONTENT" | head -5
            # Detect delimiter
            if echo "$CONTENT" | head -1 | grep -q '|'; then
              DELIM='|'
            else
              DELIM=','
            fi
            echo "🔍 Using delimiter: $DELIM"
            while IFS="$DELIM" read -r DATE DAY DESCRIPTION; do
              DATE=$(echo "$DATE" | tr -d '\r' | xargs)
              DAY=$(echo "$DAY" | tr -d '\r' | xargs)
              DESCRIPTION=$(echo "$DESCRIPTION" | tr -d '\r' | xargs)
              if [[ -z "$DATE" || "$DATE" == "Date" ]]; then
                continue
              fi
              NEW_JSON=$(jq -n \
                --arg year "$YEAR" \
                --arg holidayAt "$DATE" \
                --arg day "$DAY" \
                --arg description "$DESCRIPTION" \
                --arg status "$FILE_STATUS" \
                '{
                  year: $year,
                  holidayAt: $holidayAt,
                  day: $day,
                  description: $description,
                  gitHubFileStatus: $status
                }')
              JSON_OUTPUT=$(echo "$JSON_OUTPUT" | jq ". + [ $NEW_JSON ]")
            done < <(echo "$CONTENT")
          done < changes.txt
          echo "$JSON_OUTPUT" > output.json
          echo "========================================="
          echo "🎯 PROCESSING COMPLETED"
          echo "========================================="
          TOTAL_RECORDS=$(jq length output.json)
          echo "📊 Total Records: $TOTAL_RECORDS"
          cat output.json
      # ===============================
      # 🌐 STEP 1: WAKE CONFIG SERVER
      # ===============================
      - name: Wake Config Server
        run: |
          echo "🌐 Waking Config Server..."
          for i in {1..6}; do
            STATUS=$(curl -s https://funmarketconfigserver-dckt.onrender.com/actuator/health | jq -r '.status')
            echo "Attempt $i → $STATUS"
            if [ "$STATUS" == "UP" ]; then
              echo "✅ Config Server UP"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Config Server not responding"
          exit 1
      # ===============================
      # 🌐 STEP 2: WAKE DB SERVER
      # ===============================
      - name: Wake DB Server
        run: |
          echo "🌐 Waking DB Server..."
          for i in {1..6}; do
            STATUS=$(curl -s https://funmarketdb.onrender.com/actuator/health | jq -r '.status')
            echo "Attempt $i → $STATUS"
            if [ "$STATUS" == "UP" ]; then
              echo "✅ DB Server UP"
              exit 0
            fi
            sleep 5
          done
          echo "❌ DB Server not responding"
          exit 1
      # ===============================
      # 🚀 STEP 3: SEND DATA
      # ===============================
      - name: Send Data to API
        run: |
          echo "🚀 Sending data..."
      
          if [ ! -s output.json ]; then
            echo "⚠️ No file found"
            exit 0
          fi
      
          TOTAL_RECORDS=$(jq length output.json)
      
          if [ "$TOTAL_RECORDS" -eq 0 ]; then
            echo "⚠️ No data to send"
            exit 0
          fi
      
          echo "📦 Sending $TOTAL_RECORDS records..."
      
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            https://funmarketdb.onrender.com/fun-market/holidayCalender/addHolidays \
            -H "Content-Type: application/json" \
            -d @output.json)
      
          BODY=$(echo "$RESPONSE" | sed -n '1,/HTTP_STATUS:/p' | sed '$d')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
      
          echo "📡 Status: $STATUS"
          echo "📨 Response:"
          echo "$BODY"
      
          # ✅ FIXED CONDITION (accept all 2xx)
          if [[ "$STATUS" -lt 200 || "$STATUS" -ge 300 ]]; then
            echo "❌ API failed"
            exit 1
          fi
      
          echo "✅ SUCCESS: Data sent!"
